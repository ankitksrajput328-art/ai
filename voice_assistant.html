<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Voice Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #050509;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* The Nexus Orb (AI Avatar) */
        .orb-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #6366f1, #a855f7, #ec4899);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(2px);
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.4);
            animation: morph 8s ease-in-out infinite, pulse 4s ease-in-out infinite;
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            34% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
            67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }

        .status-text {
            margin-top: 40px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #6366f1;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .transcript {
            margin-top: 20px;
            color: #94a3b8;
            max-width: 400px;
            text-align: center;
            font-size: 18px;
            font-style: italic;
        }

        .controls {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 30px;
        }

        .btn-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-circle:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            transform: translateY(-5px);
        }

        .btn-end { color: #ef4444; }
    </style>
</head>
<body>
    <div class="orb-container">
        <div class="orb"></div>
    </div>
    
    <div class="status-text">Nexus is Listening...</div>
    <div class="transcript">"I want to see the latest architecture trends for AI apps in 2026..."</div>

    <div class="controls">
        <button class="btn-circle" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="btn-circle" id="mic-btn"><i class="fa-solid fa-microphone"></i></button>
        <button class="btn-circle btn-end" onclick="history.back()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <script>
        // Interactive pulse on mic click
        document.getElementById('mic-btn').onclick = () => {
            const status = document.querySelector('.status-text');
            status.textContent = status.textContent === 'Nexus is Listening...' ? 'Nexus is Thinking...' : 'Nexus is Listening...';
        }
    </script>
</body>
</html>

name: Nexus AI CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/nexus-backend:$IMAGE_TAG .
        docker push $ECR_REGISTRY/nexus-backend:$IMAGE_TAG
        docker tag $ECR_REGISTRY/nexus-backend:$IMAGE_TAG $ECR_REGISTRY/nexus-backend:latest
        docker push $ECR_REGISTRY/nexus-backend:latest

    - name: Update Kubernetes Deployment
      run: |
        aws eks update-kubeconfig --name nexus-prod-cluster
        kubectl set image deployment/nexus-backend nexus-backend=${{ steps.login-ecr.outputs.registry }}/nexus-backend:${{ github.sha }} -n prod
